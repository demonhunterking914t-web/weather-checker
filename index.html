<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERON WEATHER SYSTEM — PROTOTYPE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090615 0%, #0f0c20 50%, #030206 100%);
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --glass-bg: linear-gradient(135deg, rgba(20, 16, 35, 0.7) 0%, rgba(10, 6, 18, 0.9) 100%);
            --glass-border: rgba(168, 85, 247, 0.2);
            --text-glow: drop-shadow(0 0 15px rgba(168, 85, 247, 0.5));
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .aeron-core-frame {
            width: 100%;
            max-width: 460px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            border-radius: 28px;
            padding: 32px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: relative;
        }

        .block-identity {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 16px;
        }
        .brand-badge {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent-cyan);
        }
        .system-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
        }
        .pulse-node {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }

        .block-search-matrix {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 16px;
            margin-bottom: 32px;
        }
        .matrix-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            padding-left: 12px;
            font-size: 0.95rem;
        }
        .matrix-btn {
            background: var(--accent-purple);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .block-readout {
            text-align: center;
            margin-bottom: 35px;
        }
        .readout-city {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .readout-sub {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 1.5px;
            margin-top: 4px;
        }
        .readout-temp-wrapper {
            position: relative;
            display: inline-block;
            margin: 15px 0;
        }
        .readout-degree {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 6rem;
            font-weight: 700;
            line-height: 1;
            color: #fff;
            filter: var(--text-glow);
        }
        .readout-symbol {
            position: absolute;
            top: 10px;
            right: -24px;
            font-size: 1.8rem;
            color: var(--accent-cyan);
        }
        .readout-condition-tag {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--accent-purple);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .block-analytics-cluster {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .cluster-node {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
        }
        .node-title {
            display: block;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .node-data {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .system-log {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 10px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .block-signature-module {
            text-align: center;
            margin-top: 10px;
        }
        .sig-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.3), transparent);
            margin-bottom: 16px;
        }
        .sig-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 3px;
        }
        .sig-text span {
            color: #fff;
            font-weight: 700;
            text-shadow: 0 0 12px rgba(168, 85, 247, 0.8);
        }
    </style>
</head>
<body>

    <div class="aeron-core-frame">
        
        <div class="block-identity">
            <div class="brand-badge">DEVELOPED BY AERON</div>
            <div class="system-status">
                <span class="pulse-node" id="statusNode"></span>
                <span id="statusLog">SYS_LIVE</span>
            </div>
        </div>

        <div class="block-search-matrix">
            <input type="text" id="cityInput" class="matrix-input" placeholder="Query location target..." value="Taunsa">
            <button class="matrix-btn" onclick="executeWeatherQuery()">EXECUTE</button>
        </div>

        <div class="block-readout">
            <h1 class="readout-city" id="cityDisplay">TAUNSA</h1>
            <p class="readout-sub" id="countryDisplay">--</p>
            
            <div class="readout-temp-wrapper">
                <span class="readout-degree" id="tempDisplay">--</span>
                <span class="readout-symbol">°C</span>
            </div>
            
            <div class="readout-condition-tag" id="conditionDisplay">ATMOSPHERE: INITIALIZED</div>
        </div>

        <div class="block-analytics-cluster">
            <div class="cluster-node">
                <span class="node-title">HUMIDITY INDEX</span>
                <span class="node-data" id="humidityDisplay">--%</span>
            </div>
            <div class="cluster-node">
                <span class="node-title">VELOCITY MATRIX</span>
                <span class="node-data" id="windDisplay">-- km/h</span>
            </div>
        </div>

        <div class="system-log" id="errorLog" style="color: #22c55e;">SYS_LOG: INSPIRED KEYLESS CORE ACTIVE</div>

        <div class="block-signature-module">
            <div class="sig-line"></div>
            <p class="sig-text">SYSTEM CORE DEVELOPED BY <span>AERON</span></p>
        </div>

    </div>

    <script>
        // Inspired mapping dictionary for Open-Meteo weather structures
        function decodeAtmosphericMatrix(code) {
            const index = {
                0: "CLEAR SKY", 1: "MAINLY CLEAR", 2: "PARTLY CLOUDY", 3: "OVERCAST",
                45: "FOG MATRIX", 48: "RIME FOG", 51: "LIGHT DRIZZLE", 53: "MODERATE DRIZZLE",
                55: "DENSE DRIZZLE", 61: "SLIGHT RAIN", 63: "MODERATE RAIN", 65: "HEAVY RAIN",
                71: "LIGHT SNOW", 73: "MODERATE SNOW", 75: "HEAVY SNOW",
                80: "LIGHT SHOWERS", 81: "MODERATE SHOWERS", 82: "VIOLENT SHOWERS",
                95: "THUNDERSTORM SHIFT"
            };
            return index[code] || "ATMOSPHERIC STABILITY ACTIVE";
        }

        async function executeWeatherQuery() {
            const cityInput = document.getElementById('cityInput').value.trim();
            const errorLog = document.getElementById('errorLog');
            const statusLog = document.getElementById('statusLog');
            const statusNode = document.getElementById('statusNode');

            if (!cityInput) return;

            statusLog.innerText = "SYS_PARSING";
            statusNode.style.background = "#06b6d4";
            statusNode.style.boxShadow = "0 0 8px #06b6d4";

            try {
                // Step 1: Extract coordinates from Geocoding Open-Meteo structural matrix
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityInput)}&count=1&language=en&format=json`;
                const geoResponse = await fetch(geoUrl);
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    throw new Error("Location Matrix Not Found");
                }

                const node = geoData.results[0];
                const latitude = node.latitude;
                const longitude = node.longitude;

                statusLog.innerText = "SYS_STREAMING";

                // Step 2: Fetch Live Parameters inspired from open architecture payloads
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&wind_speed_unit=kmh`;
                const weatherResponse = await fetch(weatherUrl);
                const weatherData = await weatherResponse.json();

                const freshStream = weatherData.current;

                // Step 3: Populate DOM Framework
                document.getElementById('cityDisplay').innerText = node.name.toUpperCase();
                document.getElementById('countryDisplay').innerText = node.country_code ? node.country_code.toUpperCase() : "GLOBAL NODE";
                document.getElementById('tempDisplay').innerText = Math.round(freshStream.temperature_2m);
                document.getElementById('conditionDisplay').innerText = `ATMOSPHERE: ${decodeAtmosphericMatrix(freshStream.weather_code)}`;
                document.getElementById('humidityDisplay').innerText = `${freshStream.relative_humidity_2m}%`;
                document.getElementById('windDisplay').innerText = `${Math.round(freshStream.wind_speed_10m)} km/h`;
                
                errorLog.innerText = "SYS_LOG: LIVE SECURE SYNC STABLE";
                errorLog.style.color = "#22c55e";
                statusLog.innerText = "SYS_LIVE";
                statusNode.style.background = "#22c55e";
                statusNode.style.boxShadow = "0 0 8px #22c55e";

            } catch (err) {
                // Clean structural fallbacks on dynamic failure
                document.getElementById('cityDisplay').innerText = cityInput;
                document.getElementById('countryDisplay').innerText = "--";
                document.getElementById('tempDisplay').innerText = "--";
                document.getElementById('conditionDisplay').innerText = "ATMOSPHERE: LINK DETACHED";
                document.getElementById('humidityDisplay').innerText = "--%";
                document.getElementById('windDisplay').innerText = "-- km/h";

                errorLog.innerText = `CORE_ERR: ${err.message.toUpperCase()}`;
                errorLog.style.color = "#ef4444";
                statusLog.innerText = "SYS_ERROR";
                statusNode.style.background = "#ef4444";
                statusNode.style.boxShadow = "0 0 8px #ef4444";
            }
        }

        window.onload = () => {
            executeWeatherQuery();
        };
    </script>
</body>
</html>
